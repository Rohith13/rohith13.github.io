<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohith Gunupudi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 48px 32px;
  }
  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f8ef7, #9b6ef7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    margin: 0 auto 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: #8892a4;
    font-size: 15px;
    margin-top: 8px;
  }
  .divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #4f8ef7, #9b6ef7);
    margin: 28px auto;
    border-radius: 2px;
  }
  .link-card {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #1a1d27;
    border: 1px solid #2e3350;
    border-radius: 12px;
    padding: 18px 28px;
    text-decoration: none;
    color: #e2e8f0;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s;
    border-top: 3px solid #4f8ef7;
  }
  .link-card:hover {
    background: #22263a;
    border-color: #4f8ef7;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(79, 142, 247, 0.15);
  }
  .link-card .icon {
    font-size: 22px;
  }
  .link-card .text small {
    display: block;
    color: #8892a4;
    font-size: 12px;
    font-weight: 400;
    margin-top: 2px;
  }
  .arrow {
    color: #4f8ef7;
    font-size: 18px;
    margin-left: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="avatar">R</div>
  <h1>Rohith Gunupudi</h1>
  <p class="subtitle">Salesforce B2C Commerce</p>
  <div class="divider"></div>
  <a href="/interview/" class="link-card">
    <span class="icon">📋</span>
    <span class="text">
      SA Interview Prep Guide
      <small>B2C Commerce · Success Architect</small>
    </span>
    <span class="arrow">→</span>
  </a>
</div>
</body>
</html>
